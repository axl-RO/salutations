        function launchConfetti() {
    const duration = 5000; // 5 seconds
    const interval = 300;  // every 0.3 sec
    const end = Date.now() + duration;

    const confettiInterval = setInterval(() => {
      if (Date.now() > end) {
        clearInterval(confettiInterval);
        return;
      }

      confetti({
        particleCount: 80,
        spread: 100,
        startVelocity: 40,
        origin: { x: 0.5, y: 0.5 },
        colors: ['#FFD700', '#FFC300', '#FFB000', '#FFA500'],
        scalar: 1.1
      });

    }, interval);
  }

window.onload = function () {

function updateGif() {

  else if (t < 8) newGif = 2;

      gifPlayer.src = gifs[newGif];
      gifPlayer.style.opacity = 1; // fade in
    }, 200);
  }
}

// check continuously
setInterval(updateGif, 100);
