  <title>Happy Birthday Dhvanii</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #fbf2ff;
      color: rgb(0, 0, 0);
      font-family: 'Caveat', cursive;
      text-align: center;
    }

    h1 {
      margin-top: 40px;
      font-size: 3rem;
      letter-spacing: 2px;
    }

    .container {
      height: 70vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #word {
      font-size: 6rem;
      transition: all 0.5s ease;
    }

    /* Different font styles */
    .style1 { font-family: 'Courier New', monospace; }
    .style3 { font-family: 'Comic Sans MS', cursive; }
    .style5 { font-family: 'Impact', fantasy; }
    .style6 { font-family: 'Playwrite NZ Guides', cursive; }
    .style7 { font-family: 'Caveat', cursive; }
    .style10 { font-family: 'Playwrite NO', cursive; }
    .style11 { font-family: 'Dancing Script', cursive; }
    .style12 { font-family: 'Shadows Into Light', cursive; }
    .style13 { font-family: 'BBH Bartle', cursive; }
    .style14 { font-family: 'Betania Patmos In', cursive; }
    .style15 { font-family: 'Press Start 2P', cursive; }
    .style16 { font-family: 'Water Brush', cursive; }
    .style17 { font-family: 'Lacquer', cursive; }
    .style18 { font-family: 'Crafty Girls', cursive; }
    .style19 { font-family: 'Bytesized', cursive; }
    .style20 { font-family: 'Rock Salt', cursive; }
  </style>

<body>

  <h1>Happy Birthday</h1>

  <div class="container">
    <div id="word">Brother</div>
  </div>

  <script>
    const words = [
      "Brother",
      "Bro",
      "Brochacho",
      "Broski",
      "Brolab jamun",
      "Bruder",
      "Hermano",
      "兄弟",
      "형",
      "भाऊ",
      "弟",
      "Akhi",
      "Bhrata",
      "Brozilla",
      "Brotato",
      "Brometheus",
      "Broseidon",
      "Brofessor",
      "Brobot",
      "Broccolini",
      "Bro-nanza",
      "Broseph Stalin",
      "Brohemian Rhapsody"
    ];

    const styles = ["style1", "style2", "style3", "style4", "style5", "style6", "style7", "style8", "style9", "style10", "style11", "style12", "style13", "style14", "style15", "style16", "style17", "style18", "style19", "style20"];

    let index = 0;
    const wordElement = document.getElementById("word");

    function changeWord() {
      index = (index + 1) % words.length;

      wordElement.textContent = words[index];

      // Random font style
      const randomStyle = styles[Math.floor(Math.random() * styles.length)];
      wordElement.className = randomStyle;
    }

    setInterval(changeWord, 1000); // change every 1.5 sec
  </script>

  <footer style="margin-top: 20px; font-size: 0.8rem; color: #555;">
    have a great day cuh!
  </footer>
